name: Check and Update Live Sources

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Check sources and update files
        run: python3 check_sources.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add active_lives.m3u config.json
          if git diff --staged --quiet; then
            echo "内容无变化，跳过提交"
          else
            git commit -m "chore: update active source [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "✅ 已推送更新"
          fi
