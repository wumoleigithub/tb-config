name: Check and Update Live Sources

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Check sources and update active_lives.m3u
        run: |
          python3 << 'EOF'
          import urllib.request
          import urllib.error
          import urllib.parse
          import json
          import sys

          def encode_url(url):
              try:
                  url.encode('ascii')
                  return url
              except UnicodeEncodeError:
                  parsed = urllib.parse.urlsplit(url)
                  try:
                      host = parsed.hostname.encode('idna').decode('ascii')
                  except Exception:
                      host = parsed.hostname
                  netloc = host
                  if parsed.port:
                      netloc += f":{parsed.port}"
                  path = urllib.parse.quote(parsed.path, safe='/')
                  query = urllib.parse.quote(parsed.query, safe='=&')
                  return urllib.parse.urlunsplit((parsed.scheme, netloc, path, query, ''))

          def fetch_text(url, timeout=15):
              try:
                  encoded = encode_url(url)
                  req = urllib.request.Request(
                      encoded,
                      headers={"User-Agent": "Mozilla/5.0 (compatible; TVBox checker)"}
                  )
                  with urllib.request.urlopen(req, timeout=timeout) as resp:
                      if resp.status != 200:
                          return None
                      return resp.read().decode("utf-8", errors="ignore")
              except Exception as e:
                  print(f"  连接失败: {e}")
                  return None

          def try_as_m3u(content):
              """直接就是 m3u 格式"""
              if content and "#EXTM3U" in content[:512]:
                  return content
              return None

          def try_as_config_json(content, source_url):
              """从 config.json 里提取直播源 URL 并验证"""
              try:
                  data = json.loads(content)
              except Exception:
                  return None

              lives = data.get("lives", [])
              if not lives:
                  print(f"  ⚠️  config.json 里没有 lives 字段")
                  return None

              for item in lives:
                  live_url = item.get("url", "")
                  if not live_url:
                      continue
                  print(f"  → 发现直播源 URL: {live_url}")
                  live_content = fetch_text(live_url)
                  if live_content and "#EXTM3U" in live_content[:512]:
                      print(f"  ✅ 直播源有效，频道数: {live_content.count('#EXTINF')}")
                      return live_content
                  else:
                      print(f"  ❌ 直播源无效或不是 m3u 格式")

              return None

          # 读取候选源
          with open("sources_pool.txt", encoding="utf-8") as f:
              sources = [
                  line.strip()
                  for line in f
                  if line.strip() and not line.startswith("#")
              ]

          print(f"共找到 {len(sources)} 个候选源，开始检测...\n")

          active_content = None
          active_url = None

          for i, url in enumerate(sources, 1):
              print(f"[{i}/{len(sources)}] 检测: {url}")
              content = fetch_text(url)
              if not content:
                  print(f"  ❌ 无法获取内容，跳过")
                  continue

              # 先尝试直接当 m3u 解析
              result = try_as_m3u(content)
              if result:
                  print(f"  ✅ 直接是 m3u 格式，频道数: {result.count('#EXTINF')}")
                  active_content = result
                  active_url = url
                  break

              # 再尝试当 config.json 解析
              result = try_as_config_json(content, url)
              if result:
                  active_content = result
                  active_url = url
                  break

              print(f"  ❌ 无效，跳过")

          print()

          if active_content:
              with open("active_lives.m3u", "w", encoding="utf-8") as f:
                  f.write(active_content)
              print(f"✅ active_lives.m3u 已更新，来源: {active_url}")
          else:
              print("⚠️  所有候选源均无效，保留原有 active_lives.m3u 不变")
              sys.exit(0)
          EOF

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add active_lives.m3u
          if git diff --staged --quiet; then
            echo "内容无变化，跳过提交"
          else
            git commit -m "chore: update active source [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "✅ 已推送更新"
          fi
